[tools]
rust = "1.93.1"

[tasks.run]
description = "Run the game (release, debug crashes on macOS 26)"
run = "cargo run --package genesis-app --release"

[tasks.build]
description = "Build all crates"
run = "cargo build --workspace"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.check]
description = "Type-check all crates"
run = "cargo check --workspace"

[tasks.clippy]
description = "Run clippy lints"
run = "cargo clippy --workspace -- -D warnings"

[tasks.fmt]
description = "Format all code"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check code formatting"
run = "cargo fmt --all -- --check"

[tasks.ci]
description = "Run all CI checks (fmt, clippy, tests)"
depends = ["fmt-check", "clippy", "test"]
